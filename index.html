<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KAX 旅行地图</title>
<style>
:root{--ink:#1a1a1a;--muted:#6b7280;--paper:#faf9f6;--card:#fff}
*{box-sizing:border-box}body{margin:0;color:var(--ink);background:var(--paper);font-family:"Microsoft YaHei","PingFang SC",system-ui,sans-serif}
.hero{background:linear-gradient(135deg,#c2410c,#b91c1c,#7f1d1d);color:#fff;padding:40px 24px;text-align:center}
.hero h1{font-size:32px;margin:0 0 6px}.hero p{font-size:14px;opacity:.85;margin:0}
.grid{max-width:900px;margin:30px auto;padding:0 20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.card{display:block;background:var(--card);border:1px solid #e5e7eb;border-radius:16px;padding:22px 20px;text-decoration:none;color:var(--ink);transition:.18s;box-shadow:0 2px 8px #00000006}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 28px #00000010;border-color:#fca5a5}
.card .emoji{font-size:36px;margin-bottom:8px}
.card h2{font-size:17px;margin:0 0 6px}.card p{font-size:12px;color:var(--muted);margin:0;line-height:1.5}
.card .tags{margin-top:10px;display:flex;gap:5px;flex-wrap:wrap}
.card .tag{padding:3px 8px;border-radius:999px;font-size:10px;font-weight:600;background:#f3f4f6;color:#4b5563}
footer{text-align:center;padding:40px 20px;font-size:11px;color:var(--muted)}
footer a{color:#b91c1c;text-decoration:none}
</style>
</head>
<body>
<div class="hero">
  <h1>🗺️ KAX 旅行地图</h1>
  <p>高德底图 + OSRM路线 · 逐段导航 · 免费托管于 GitHub Pages</p>
</div>
<div class="grid">
  <a href="tianjin/" class="card">
    <div class="emoji">🏮</div>
    <h2>天津两天一夜 · 美食漫游</h2>
    <p>2026年7月4-5日 · 19个打卡点 · 17段路程 · 地铁为主 · 两人出行</p>
    <div class="tags">
      <span class="tag">🍜 美食</span>
      <span class="tag">🏛 景点</span>
      <span class="tag">🚇 地铁</span>
      <span class="tag">💰 ¥529-609</span>
    </div>
  </a>
</div>
<footer>
  地图数据：高德 + OpenStreetMap · 路线引擎：OSRM · <a href="https://github.com/anankax/travel">GitHub</a>
</footer>
</body>
</html>
